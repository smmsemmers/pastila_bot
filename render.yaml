# Render деплой — фоновый воркер (не web-сервис, у бота нет входящего порта).
#
# ВАЖНО про план и 24/7:
#   • Бот работает через long-polling (run_polling), входящего HTTP-порта у него нет,
#     поэтому правильный тип сервиса — именно worker, а не web.
#   • На бесплатном плане Render воркеров НЕТ (убрали) — worker доступен только на
#     платных планах, минимум Starter (~$7/мес). Поэтому здесь plan: starter —
#     это и есть единственный способ держать бота включённым 24/7 (дайджест/алерты
#     по расписанию срабатывают только пока процесс жив).
#   • Деньги списываются, лишь когда ты реально создашь платный сервис в Render.
#     Хочешь пока бесплатно — см. DEPLOY.md, раздел «Бесплатный вариант» (web-сервис
#     с health-портом; засыпает через 15 мин простоя, расписание может пропускаться).
services:
  - type: worker
    name: pastila-task-bot
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      # ВАЖНО: python-telegram-bot 21.6 несовместим с Python 3.14 (ломается run_polling).
      # Закрепляем 3.12 (Render по умолчанию берёт самую новую версию).
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: BOT_TOKEN
        sync: false
      - key: GROUP_CHAT_ID
        sync: false
      - key: THREAD_LENA
        sync: false
      - key: THREAD_GLEB
        sync: false
      - key: SHEET_ID
        sync: false
      - key: SHEET_NAME
        value: Sheet1
      - key: GOOGLE_CREDENTIALS
        sync: false
      - key: TAG_LENA
        value: "@elenaisanewleet"
      - key: TAG_GLEB
        value: "@foxruso"
      # Утренний дайджест: время и таймзона
      - key: DIGEST_HOUR
        value: "12"
      - key: DIGEST_MINUTE
        value: "0"
      - key: TZ
        value: "Europe/Moscow"
      # Дедлайн-алерты (задачи на завтра)
      - key: ALERT_HOUR
        value: "12"
      - key: ALERT_MINUTE
        value: "0"
      # Распознавание речи (Whisper). Без ключа голосовой ввод просто выключен.
      # ТОЛЬКО для Whisper — текстовые функции идут через OpenRouter ниже.
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: WHISPER_MODEL
        value: "whisper-1"
      # ── LLM-роутер (OpenRouter): /analyze, /plan, /model, /trim, разбор голоса ──
      # Обязателен для текстовых LLM-функций. Ключ на openrouter.ai.
      # Без него /analyze, /plan, /model и разбор голоса выключены (бот не падает).
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TRIM_LEVEL
        value: "4"
      - key: CONTEXT_MODE
        value: "truncate"
      - key: SQUEEZE_MODEL
        value: "sonnet46"
      # ── База знаний: файлы + Notion ──
      # VISION_MODEL — модель для описания картинок/схем (default: haiku45 — дёшево)
      - key: VISION_MODEL
        value: "haiku45"
      # NOTION_TOKEN — Internal Integration Secret с notion.so/my-integrations
      - key: NOTION_TOKEN
        sync: false
      # NOTION_PAGES — page_id через запятую; пусто = все страницы интеграции
      - key: NOTION_PAGES
        value: ""
      # INSIGHT_NOTIFY — true: бот пишет в чат когда находит важную мысль
      # false: только ⭐-реакция + тихое сохранение в KB
      - key: INSIGHT_NOTIFY
        value: "true"
