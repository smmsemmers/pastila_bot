# Render деплой — фоновый воркер (не web-сервис, у бота нет входящего порта)
services:
  - type: worker
    name: pastila-task-bot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      # ВАЖНО: python-telegram-bot 21.6 несовместим с Python 3.14 (ломается run_polling).
      # Закрепляем 3.12 (Render по умолчанию берёт самую новую версию).
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: BOT_TOKEN
        sync: false
      - key: GROUP_CHAT_ID
        sync: false
      - key: THREAD_LENA
        sync: false
      - key: THREAD_GLEB
        sync: false
      - key: SHEET_ID
        sync: false
      - key: SHEET_NAME
        value: Sheet1
      - key: GOOGLE_CREDENTIALS
        sync: false
      - key: TAG_LENA
        value: "@elenaisanewleet"
      - key: TAG_GLEB
        value: "@foxruso"
      # Утренний дайджест: время и таймзона
      - key: DIGEST_HOUR
        value: "12"
      - key: DIGEST_MINUTE
        value: "0"
      - key: TZ
        value: "Europe/Moscow"
      # Дедлайн-алерты (задачи на завтра)
      - key: ALERT_HOUR
        value: "12"
      - key: ALERT_MINUTE
        value: "0"
      # Распознавание речи (Whisper). Без ключа голосовой ввод просто выключен.
      # ТОЛЬКО для Whisper — текстовые функции идут через OpenRouter ниже.
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: WHISPER_MODEL
        value: "whisper-1"
      # ── LLM-роутер (OpenRouter): /analyze, /plan, /model, /trim, разбор голоса ──
      # Обязателен для текстовых LLM-функций. Ключ на openrouter.ai.
      # Без него /analyze, /plan, /model и разбор голоса выключены (бот не падает).
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TRIM_LEVEL
        value: "4"
      - key: CONTEXT_MODE
        value: "truncate"
      - key: SQUEEZE_MODEL
        value: "sonnet46"
      # ── База знаний: файлы + Notion ──
      # VISION_MODEL — модель для описания картинок/схем (default: haiku45 — дёшево)
      - key: VISION_MODEL
        value: "haiku45"
      # NOTION_TOKEN — Internal Integration Secret с notion.so/my-integrations
      - key: NOTION_TOKEN
        sync: false
      # NOTION_PAGES — page_id через запятую; пусто = все страницы интеграции
      - key: NOTION_PAGES
        value: ""
      # INSIGHT_NOTIFY — true: бот пишет в чат когда находит важную мысль
      # false: только ⭐-реакция + тихое сохранение в KB
      - key: INSIGHT_NOTIFY
        value: "true"
      # ── Аппрув групп ──
      # GROUP_APPROVAL=true: при добавлении бота в новую группу админам летит
      # запрос ✅/❌, до одобрения бот в группе молчит. Одобренные группы хранятся
      # в таблице (llm_config!A2) и переживают редеплой.
      - key: GROUP_APPROVAL
        value: "true"
      # ADMIN_USER_IDS — кто одобряет (numeric id через запятую); по умолчанию Лена.
      - key: ADMIN_USER_IDS
        value: "41082373"

  # ── GPT-бот (@pastila_gPT_remote_bot), код в подпапке gpt-remote/ ──
  # Отдельный воркер: Node.js, polling, входящего порта нет.
  - type: worker
    name: pastila-gpt-remote
    runtime: node
    plan: starter
    rootDir: gpt-remote
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Токен бота от @BotFather
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # ── LLM-провайдер ──
      # Основной режим — OpenRouter (авто-роутинг: chat→Opus 4.8, code→GPT-5.3 Codex,
      # reasoning→GPT-5.5, vision/OCR→Gemini 3.1 Pro; /agent→Perplexity Sonar Deep).
      # Обязателен для полноценной работы; без него — откат на OpenAI + OPENAI_MODEL.
      - key: OPENROUTER_API_KEY
        sync: false
      # OpenAI: fallback-модель (когда нет OpenRouter) и/или Codex CLI.
      - key: OPENAI_API_KEY
        sync: false
      # OPENAI_MODEL — fallback, а не основная модель при работающем OpenRouter.
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      # Контроль доступа: Telegram numeric ID через запятую
      - key: ALLOWED_USER_IDS
        sync: false
      - key: ALLOWED_CHAT_IDS
        sync: false
      # Codex / выполнение локальных команд (по умолчанию выключено)
      - key: ENABLE_CODEX
        value: "false"
      - key: CODEX_WORKDIR
        sync: false
      - key: CODEX_SANDBOX
        sync: false
      - key: CODEX_TIMEOUT_MS
        sync: false
